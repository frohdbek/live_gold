name: Altin Takip Sistemi

on:
  schedule:
    - cron: '0 * * * *' 
  workflow_dispatch: 
  
permissions:
  contents: write # Dosyayı güncelleyip geri yazması için şart

jobs:
  takip:
    runs-on: ubuntu-latest
    steps:
      - name: Kodları Çek
        uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Kütüphaneleri Yükle
        run: pip install requests beautifulsoup4

      - name: Botu Çalıştır
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python live_gold.py

      - name: Hafızayı Güncelle (Git Push)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add last_price.txt
          git commit -m "Bot: Fiyat hafızası güncellendi" || echo "Değişim yok"
          git push
